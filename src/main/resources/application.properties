############################################
# ACTIVE PROFILE
############################################

# LOCAL development profile
spring.profiles.active=local

############################################
# DATABASE CONNECTION (COMMON SETTINGS)
############################################

# JDBC driver used to connect to MySQL
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# Database connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/mobilele_db?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true

############################################
# JPA / HIBERNATE SETTINGS
############################################
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql = FALSE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

############################################
# SPRING MVC CONFIGURATION
############################################

#Change post request to @DeleteMapping
spring.mvc.hiddenmethod.filter.enabled=true

############################################
# LOGGING (SAFE DEFAULTS)
############################################

# Show only warnings and errors by default
logging.level.root=INFO
# Your own packages — show everything down to DEBUG if needed
logging.level.com.example.mobilele=DEBUG
# Hibernate: silence noisy SQL, but still log warnings/errors
logging.level.org.hibernate.SQL=OFF
# SQL parameter binding logs disabled
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
# Logs SQL exceptions
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR
# Spring Security warnings (authentication failures as 403, etc.)
logging.level.org.springframework.security=WARN
# Web layer — only log actual errors
logging.level.org.springframework.web=ERROR
# JPA internal logs
logging.level.org.springframework.orm.jpa=ERROR
# Transaction manager logs
logging.level.org.springframework.transaction=ERROR
# General framework logs
logging.level.org = WARN
logging.level.blog = WARN

############################################
# SQL OUTPUT SETTINGS
############################################

# Prevents SQL queries from being printed to console
spring.jpa.show-sql=false

############################################
# ACTUATOR ENDPOINTS
############################################
management.endpoints.web.exposure.include=health,info

############################################
# CLOUDINARY URL BUILD
############################################
cloudinary.cloud-name=yavorhr
cloudinary.root-folder=mobilele
cloudinary.base-url=https://res.cloudinary.com