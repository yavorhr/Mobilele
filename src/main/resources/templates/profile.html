<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head(additionalCss='/css/users/profile.css')"></head>

<header th:replace="fragments/navbar"></header>

<body class="auth-layout">

<main class="container profile-container auth-content" th:object="${user}">
    <section class="profile-card">
        <h2 class="text-center mb-4" th:text="#{profile.title}">My Profile</h2>

        <div class="profile-info">
            <!-- Username -->
            <div class="field">
                <strong th:text="#{profile.username}">Username:</strong>
                <span id="username-display" th:text="*{username}"></span>
                <input id="username-input" type="text" th:value="*{username}" readonly class="hidden readonly-input">
            </div>

            <!-- First Name -->
            <div class="field">
                <strong th:text="#{profile.firstName}">First Name:</strong>
                <span id="firstName-display" th:text="*{firstName}"></span>
                <input id="firstName-input" type="text" th:value="*{firstName}" class="hidden editable-input">
            <p id="firstName-error" class="error-msg hidden"></p>
            </div>

            <!-- Last Name -->
            <div class="field">
                <strong th:text="#{profile.lastName}">Last Name:</strong>
                <span id="lastName-display" th:text="*{lastName}"></span>
                <input id="lastName-input" type="text" th:value="*{lastName}" class="hidden editable-input">
            <p id="lastName-error" class="error-msg hidden"></p>
            </div>

            <!-- Email -->
            <div class="field">
                <strong th:text="#{profile.email}">Email:</strong>
                <span id="email-display" th:text="*{email}"></span>
                <input id="email-input" type="email" th:value="*{email}" readonly class="hidden readonly-input">
            </div>

            <!-- Phone Number -->
            <div class="field">
                <strong th:text="#{profile.phone}">Phone Number:</strong>
                <span id="phoneNumber-display" th:text="*{phoneNumber}"></span>
                <input id="phoneNumber-input" type="text" th:value="*{phoneNumber}" class="hidden editable-input">
            <p id="phoneNumber-error" class="error-msg hidden"></p>
            </div>

        </div>

        <div class="actions mt-4">
            <button id="edit-btn" class="btn btn-submit" th:text="#{profile.edit}">Edit Profile</button>
            <button id="save-btn" class="btn btn-success hidden" th:text="#{profile.save}">Save</button>
            <button id="cancel-btn" class="btn btn-secondary hidden" th:text="#{profile.cancel}">Cancel</button>
        </div>
    </section>
</main>

<footer th:replace="fragments/minimal-footer"></footer>

</body>

<script th:src="@{/js/editProfile.js}"></script>
</html>
