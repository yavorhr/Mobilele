<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>

<body>
<th:block th:fragment="pagination(baseUrl, currentPage, totalPages, sort, dir, size)">

  <div class="pagination-container d-flex justify-content-center align-items-center mt-4"
       th:if="${totalPages > 1}">

    <!-- Prev -->
    <a th:if="${currentPage > 0}"
       th:href="@{${baseUrl}(
               page=${currentPage - 1},
               sort=${sort},
               dir=${dir},
               size=${size}
           )}"
       class="pagination-btn">
      &laquo; Prev
    </a>

    <!-- Page Numbers -->
    <div class="pagination-numbers mx-2">
      <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
         th:href="@{${baseUrl}(
                   page=${i},
                   sort=${sort},
                   dir=${dir},
                   size=${size}
               )}"
         th:text="${i + 1}"
         th:classappend="${i == currentPage} ? 'active' : ''"
         class="pagination-number">
      </a>
    </div>

    <!-- Next -->
    <a th:if="${currentPage + 1 < totalPages}"
       th:href="@{${baseUrl}(
               page=${currentPage + 1},
               sort=${sort},
               dir=${dir},
               size=${size}
           )}"
       class="pagination-btn">
      Next &raquo;
    </a>

  </div>

</th:block>

</body>
</html>
